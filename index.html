const selectedProductsByCategory = {};
const shelfReportData = [];

const intern = document.getElementById("intern");
const dateTime = document.getElementById("dateTime");
const gps = document.getElementById("gps");
const accountSelect = document.getElementById("account");
const outletSelect = document.getElementById("outlet");
const categorySelect = document.getElementById("category");
const shelfCategory = document.getElementById("shelfCategory");
const productList = document.getElementById("productList");
const availabilityPct = document.getElementById("availabilityPct");
const totalFacings = document.getElementById("totalFacings");
const ourFacings = document.getElementById("ourFacings");
const shelfTableBody = document.getElementById("shelfTableBody");

if (!localStorage.getItem("savedDateTime")) {
    localStorage.setItem("savedDateTime", new Date().toLocaleString());
}

dateTime.value = localStorage.getItem("savedDateTime");

function captureLocation() {
    navigator.geolocation.getCurrentPosition(
        (pos) => {
            gps.value = pos.coords.latitude.toFixed(5) + "," + pos.coords.longitude.toFixed(5);
        },
        () => {
            alert("Please allow location access");
        }
    );
}

function loadAccounts() {
    accountSelect.innerHTML = `<option value="">Select Account</option>`;
    [...new Set(outlets.map(x => x.account))].forEach(account => {
        accountSelect.innerHTML += `<option value="${account}">${account}</option>`;
    });
}

loadAccounts();

accountSelect.onchange = () => {
    const acc = accountSelect.value;

    outletSelect.innerHTML = `<option value="">Select Outlet</option>`;
    outlets.filter(x => x.account === acc).forEach(x => {
        outletSelect.innerHTML += `<option value="${x.name}">${x.name}</option>`;
    });

    categorySelect.innerHTML = "";
    shelfCategory.innerHTML = "";

    [...new Set(skuMaster.filter(x => x.account === acc).map(x => x.category))]
        .forEach(category => {
            categorySelect.innerHTML += `<option value="${category}">${category}</option>`;
            shelfCategory.innerHTML += `<option value="${category}">${category}</option>`;
        });

    loadProducts();
};

categorySelect.onchange = loadProducts;

function loadProducts() {
    const list = skuMaster.filter(x => x.account === accountSelect.value && x.category === categorySelect.value);
    productList.innerHTML = "";

    list.forEach(item => {
        const checked = (selectedProductsByCategory[categorySelect.value] || []).includes(item.skuName);

        productList.innerHTML += `
            <label class="flex items-center gap-2 bg-gray-50 p-2 rounded">
                <input type="checkbox" value="${item.skuName}" ${checked ? "checked" : ""} onchange="updateSelection()">
                <span>${item.skuName}</span>
            </label>
        `;
    });

    calcAvailability();
}

function updateSelection() {
    selectedProductsByCategory[categorySelect.value] = [
        ...document.querySelectorAll("#productList input:checked")
    ].map(x => x.value);

    calcAvailability();
}

function calcAvailability() {
    const total = document.querySelectorAll("#productList input").length;
    const selected = document.querySelectorAll("#productList input:checked").length;

    availabilityPct.innerText = total ? ((selected / total) * 100).toFixed(1) : 0;
}

function addShelf() {
    const cat = shelfCategory.value;
    const total = +totalFacings.value || 0;
    const ours = +ourFacings.value || 0;

    if (!cat || total <= 0) {
        alert("Enter valid data");
        return;
    }

    const pct = ((ours / total) * 100).toFixed(1);
    const row = {
        category: cat,
        totalFacings: total,
        ourFacings: ours,
        sharePct: pct
    };

    const existingIndex = shelfReportData.findIndex(x => x.category === cat);

    if (existingIndex >= 0) {
        shelfReportData[existingIndex] = row;
    } else {
        shelfReportData.push(row);
    }

    renderShelf();
    totalFacings.value = "";
    ourFacings.value = "";
    shelfCategory.selectedIndex = 0;
}

function renderShelf() {
    shelfTableBody.innerHTML = "";

    shelfReportData.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td class="border p-2">${row.category}</td>
            <td class="border p-2">${row.totalFacings}</td>
            <td class="border p-2">${row.ourFacings}</td>
            <td class="border p-2">${row.sharePct}%</td>
        `;
        shelfTableBody.appendChild(tr);
    });
}

function saveDraft() {
    localStorage.setItem("draft", JSON.stringify({
        intern: intern.value,
        account: accountSelect.value,
        outlet: outletSelect.value,
        selectedProductsByCategory,
        shelfReportData
    }));

    localStorage.setItem("savedDateTime", dateTime.value);
    alert("Saved successfully");
}

window.onload = () => {
    const draft = JSON.parse(localStorage.getItem("draft") || "null");

    if (localStorage.getItem("savedDateTime")) {
        dateTime.value = localStorage.getItem("savedDateTime");
    }

    if (!draft) return;

    intern.value = draft.intern || "";
    accountSelect.value = draft.account || "";
    accountSelect.onchange();

    setTimeout(() => {
        outletSelect.value = draft.outlet || "";

        Object.keys(selectedProductsByCategory).forEach(key => delete selectedProductsByCategory[key]);
        Object.assign(selectedProductsByCategory, draft.selectedProductsByCategory || {});

        shelfReportData.length = 0;
        shelfReportData.push(...(draft.shelfReportData || []));

        renderShelf();
        loadProducts();
    }, 200);
};

function clearDraft() {
    localStorage.removeItem("draft");
    localStorage.removeItem("savedDateTime");
    location.reload();
}

function buildSummary() {
    return [{
        Account: accountSelect.value,
        Outlet: outletSelect.value,
        Intern: intern.value,
        GPS: gps.value,
        DateTime: dateTime.value
    }];
}

function buildAvailability() {
    const rows = [];

    Object.keys(selectedProductsByCategory).forEach(cat => {
        const all = skuMaster.filter(x => x.account === accountSelect.value && x.category === cat);
        const selected = selectedProductsByCategory[cat] || [];

        rows.push({
            Account: accountSelect.value,
            Outlet: outletSelect.value,
            Category: cat,
            Available: selected.join(", "),
            AvailabilityPercent: all.length ? ((selected.length / all.length) * 100).toFixed(1) : 0
        });
    });

    return rows;
}

function buildNotAvailable() {
    const rows = [];

    Object.keys(selectedProductsByCategory).forEach(cat => {
        const all = skuMaster.filter(x => x.account === accountSelect.value && x.category === cat);
        const selected = selectedProductsByCategory[cat] || [];

        all.forEach(sku => {
            if (!selected.includes(sku.skuName)) {
                rows.push({
                    Account: accountSelect.value,
                    Outlet: outletSelect.value,
                    SKUCode: sku.skuCode,
                    SKUName: sku.skuName
                });
            }
        });
    });

    return rows;
}

function buildSOS() {
    return shelfReportData.map(row => ({
        Account: accountSelect.value,
        Outlet: outletSelect.value,
        Category: row.category,
        Total: row.totalFacings,
        Our: row.ourFacings,
        Share: row.sharePct
    }));
}

function createWorkbook() {
    const wb = XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(buildSummary()), "Summary");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(buildAvailability()), "Availability");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(buildSOS()), "SOS Check");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(buildNotAvailable()), "Not Available SKUs");

    return wb;
}

function downloadExcel() {
    const summary = buildSummary();
    const availability = buildAvailability();
    const sos = buildSOS();
    const notAvailable = buildNotAvailable();

    let csvContent = "STORE AUDIT SUMMARY
";
    csvContent += "Account,Outlet,Intern,GPS,DateTime
";
    summary.forEach(row => {
        csvContent += `${row.Account},${row.Outlet},${row.Intern},${row.GPS},${row.DateTime}
`;
    });

    csvContent += "
AVAILABILITY
";
    csvContent += "Category,Available,AvailabilityPercent
";
    availability.forEach(row => {
        csvContent += `${row.Category},\"${row.Available}\",${row.AvailabilityPercent}
`;
    });

    csvContent += "
SHARE OF SHELF
";
    csvContent += "Category,Total,Our,Share
";
    sos.forEach(row => {
        csvContent += `${row.Category},${row.Total},${row.Our},${row.Share}
`;
    });

    csvContent += "
NOT AVAILABLE SKUS
";
    csvContent += "SKUCode,SKUName
";
    notAvailable.forEach(row => {
        csvContent += `${row.SKUCode},${row.SKUName}
`;
    });

    const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "StoreAudit.csv";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

    try {
        const summary = buildSummary();

        let csvContent = "STORE AUDIT SUMMARY

";
        summary.forEach(row => {

`;
        });

        csvContent += "
AVAILABILITY
";
        csvContent += "Category,Available,AvailabilityPercent
";
        availability.forEach(row => {
            csvContent += `${row.Category},\"${row.Available}\",${row.AvailabilityPercent}
`;
        });

        csvContent += "
SHARE OF SHELF
";
        csvContent += "Category,Total,Our,Share
";
        sos.forEach(row => {
            csvContent += `${row.Category},${row.Total},${row.Our},${row.Share}
`;
        });

        csvContent += "
NOT AVAILABLE SKUS
";
        csvContent += "SKUCode,SKUName
";
        notAvailable.forEach(row => {
            csvContent += `${row.SKUCode},${row.SKUName}
`;
        });

        const blob = new Blob([csvContent], {
            type: "text/csv;charset=utf-8;"
        });

        const fileName = "StoreAudit.csv";

        if (navigator.share) {
            try {
                const file = new File([blob], fileName, {
                    type: "text/csv"
                });

                await navigator.share({
                    files: [file],
                    title: "Store Audit Report",
                    text: "Store Audit CSV Report"
                });

                return;
            } catch (shareError) {
                console.log("Direct share failed:", shareError);
            }
        }

        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        alert("CSV downloaded successfully. Please share manually from Downloads folder.");

    } catch (error) {
        console.log(error);
        alert("Error while generating CSV file");
    }
}
